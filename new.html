<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salamun Alaykum</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <style>
    .prayer-widget{font-family:inherit;color:#1f2937;}
    .prayer-card{background:#e0e7ff;border-radius:0.5rem;padding:16px;}
    .prayer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
    .prayer-title{font-size:18px;font-weight:700;color:#111827;}
    .prayer-hijri{font-size:13px;color:#4b5563;}
    .prayer-loc{display:flex;align-items:center;gap:8px;margin-top:6px;}
    .city-search-wrap{position:relative;max-width:220px;flex:1;}
    .city-search-input{width:100%;border:1px solid #cbd5f5;padding:6px 10px;font-size:13px;border-radius:6px;outline:none;background:#fff;}
    .city-search-input:focus{border-color:#6366f1;}
    .city-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #cbd5f5;
      border-top:none;max-height:240px;overflow-y:auto;z-index:100;box-shadow:0 6px 16px rgba(0,0,0,0.12);}
    .city-dropdown.show{display:block;}
    .city-dropdown .city-opt{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f3f4f6;}
    .city-dropdown .city-opt:hover,.city-dropdown .city-opt.active{background:#eef2ff;color:#3730a3;}
    .city-dropdown .city-opt .city-en{font-size:11px;color:#9ca3af;margin-left:6px;}
    .city-dropdown .city-no-result{padding:8px 10px;color:#9ca3af;font-size:12px;text-align:center;}
    .gps-btn{background:#fff;border:1px solid #cbd5f5;color:#4f46e5;width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
    .gps-btn:hover{background:#eef2ff;}
    .prayer-method{border:1px solid #cbd5f5;border-radius:6px;padding:6px 10px;font-size:12px;background:#fff;color:#374151;}
    .prayer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
    @media(min-width:640px){.prayer-grid{grid-template-columns:repeat(4,1fr);}}
    .prayer-col{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:10px;text-align:center;}
    .prayer-col .pc-name{font-size:12px;color:#6b7280;margin-bottom:4px;}
    .prayer-col .pc-time{font-size:14px;font-weight:700;color:#111827;}
    .prayer-col.is-next{
      border:1px solid transparent;
      background:
        linear-gradient(#ffffff,#ffffff) padding-box,
        linear-gradient(135deg,#fb923c,#f59e0b,#f97316) border-box;
      box-shadow:0 8px 18px rgba(249,115,22,0.18);
    }
    .prayer-col.is-sunrise-warning{
      border:1px solid #ef4444;
      background:#fee2e2;
    }
    .prayer-col .pc-remaining{font-size:11px;color:#4b5563;margin-top:4px;}

    .shortcut-item{position:relative;}
    .shortcut-menu-btn{opacity:0;transition:opacity 0.2s ease;position:absolute;top:2px;right:2px;border:none;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;line-height:1;padding:2px 6px;cursor:pointer;}
    .shortcut-item:hover .shortcut-menu-btn{opacity:1;}
    .shortcut-menu{display:none;position:absolute;top:28px;right:2px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;min-width:110px;box-shadow:0 8px 20px rgba(0,0,0,0.12);z-index:50;}
    .shortcut-item.is-open .shortcut-menu{display:block;}
    .shortcut-menu button{display:block;width:100%;text-align:left;padding:8px 10px;background:#fff;border:none;font-size:12px;cursor:pointer;}
    .shortcut-menu button:hover{background:#f3f4f6;}
    </style>
</head>
<body>
  <div class="fixed hidden inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full" id="bookmark-modal"></div>
    <div class="w-full flex px-6">
      <div class="w-6/12 py-6 px-4 ">
        <div class="bg-indigo-200 rounded-md p-5">
          <h2 class="title text-3xl font-bold text-gray-900">

          </h2>
          <h4 class="top text-2xl font-bold text-gray-900">
  
          </h4>
          <div class="arabic text-3xl font-bold text-gray-900 my-10">
  
          </div>
          <div class="translation text-2xl font-medium text-zinc-400 my-5">
  
          </div>
          <div class="bottom">
  
          </div>
          <div class="reference">
  
          </div>
        </div>
      </div>
      <div class="w-6/12 py-6 px-4 ">
        <div class="bg-red-400 rounded-md p-5" id="ramadanCountdown">
          <h3 id="demo" class="text-2xl font-semibold"></h3> <span class="text-xl" id="ramadanLabel">Days till Ramadan</span>
        </div>

        <div class="bg-red-400 rounded-md p-5 my-5 hidden" id="deedsBox">
          <h3 id="deeds" class="text-2xl"></h3>
        </div>

        <div class="prayer-widget">
          <div class="prayer-card">
            <div class="prayer-head">
              <div>
                <div class="prayer-title">Prayer Times</div>
                <div class="prayer-hijri" id="prayerDateHijri">Hijri date</div>
              </div>
              <select id="prayerMethodSelect" class="prayer-method">
                <option value="MuslimWorldLeague">Muslim World League</option>
                <option value="Karachi">Karachi</option>
                <option value="Egyptian">Egyptian</option>
                <option value="UmmAlQura">Umm Al-Qura</option>
                <option value="Dubai">Dubai</option>
                <option value="NorthAmerica">North America (ISNA)</option>
                <option value="Kuwait">Kuwait</option>
                <option value="Qatar">Qatar</option>
                <option value="Singapore">Singapore</option>
                <option value="Turkey">Turkey (Diyanet)</option>
              </select>
            </div>

            <div class="prayer-loc">
              <div class="city-search-wrap" id="citySearchWrap">
                <input type="text" id="citySearchInput" class="city-search-input" placeholder="Search city..." autocomplete="off">
                <div class="city-dropdown" id="cityDropdown"></div>
              </div>
              <button type="button" id="gpsBtn" class="gps-btn" title="Use GPS">GPS</button>
            </div>

            <div class="prayer-grid" id="prayerTimesList"></div>
            <div class="mt-3 text-xs text-gray-500">
              <a href="https://aladhan.com/credits-and-terms" target="_blank" rel="noopener noreferrer">
                Prayer times data: Aladhan
              </a>
            </div>
          </div>
        </div>

        <div id="shortcuts" class="flex">
          <!-- <a href="#" class="w-20 flex items-center flex-col hover:bg-gray-300 my-2 transition-all duration-200 ease-linear rounded-md p-2">
            <div class="rounded-full bg-gray-200 h-10 w-10 p-2">
              <img src="https://img.icons8.com/fluency/2x/adobe-animate.png" alt="" srcset="">
            </div>
            <div class="text-center font-bold">
              Google
            </div>
          </a> -->
          <button type="button" id="showBookmarkForm" class="w-36 flex items-center flex-col hover:bg-gray-300 my-2 transition-all duration-200 ease-linear rounded-md p-2">
            <div class="rounded-full bg-gray-200 h-10 w-10 p-2">
              <img src="https://img.icons8.com/fluency/2x/plus.png" alt="" srcset="">
            </div>
            <div class="text-center font-bold">
              Add Shortcut
            </div>
          </button>

        </div>
      </div>
    </div>

    <div class="w-1/2 hidden bg-indigo-300 mx-auto my-auto p-10 rounded-lg absolute top-1/3 left-1/4" id="bookmark-form">
      <div class="mx-auto">
        <input type="text" name="shortcutname" id="shortcutname" placeholder="Shortcut Name" class="w-full mx-auto my-2 border-2 border-teal-400 text-xl p-2">
        <input type="text" name="shortcuticonurl" id="shortcuticonurl" placeholder="Icon URL (optional)" class="w-full mx-auto my-2 border-2 border-teal-400 text-xl p-2">
        <input type="text" name="shortcuturl" id="shortcuturl" placeholder="Shortcut URL" class="w-full mx-auto my-2 border-2 border-teal-400 text-xl p-2">
      </div>
      <button type="button" class="rounded-md bg-teal-800 hover:bg-teal-500 duration-300 hover:duration-300 ease-in-out text-white font-bold text-xl px-5 py-2" id="addShortcut">Add Shortcut</button>
    </div>

    <script src="js/gtaf.js"></script>
    <script src="js/prayer-times.js"></script>
    <script src="js/core.js"></script>
</body>
</html>
